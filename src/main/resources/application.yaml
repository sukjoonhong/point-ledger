spring:
  application:
    name: point-ledger
  profiles:
    active: local

point-ledger:
  policy:
    min-earn-limit: 1
    max-earn-limit: 100000
    max-free-point-holding-limit: 1000000
    expire-days: 365
---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:file:./data/pointdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

point-ledger:
  policy:
    min-earn-limit: 1
    max-earn-limit: 100000
    max-free-point-holding-limit: 1000000
    expire-days: 365